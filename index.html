<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Курс валют</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

h1 {
    font-size: 40px;
    margin-bottom: 40px;
}

.search-box {
    background: #1e293b;
    padding: 15px;
    border-radius: 30px;
    display: flex;
    gap: 10px;
    align-items: center;
}

input, select {
    padding: 10px;
    border: none;
    border-radius: 10px;
    outline: none;
}

input {
    width: 100px;
    text-align: center;
}

select {
    background: #0f172a;
    color: white;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 30px;
    font-size: 24px;
}
</style>
</head>

<body>

<h1>💱 Конвертер валют</h1>

<div class="search-box">
    <input type="number" id="amount" value="1">

    <select id="from">
        <option value="USD">USD</option>
        <option value="UZS">UZS</option>
        <option value="RUB">RUB</option>
    </select>

    ➡️

    <select id="to">
        <option value="UZS">UZS</option>
        <option value="USD">USD</option>
        <option value="RUB">RUB</option>
    </select>

    <button onclick="convert()">OK</button>
</div>

<div class="result" id="result"></div>

<script>
async function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    let res = await fetch("https://open.er-api.com/v6/latest/" + from);
    let data = await res.json();

    let rate = data.rates[to];
    let result = (amount * rate).toFixed(2);

    document.getElementById("result").innerText =
        amount + " " + from + " = " + result + " " + to;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конвертер валют</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
    text-align: center;
}

input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin: 5px;
    width: 100%;
    box-sizing: border-box;
}

.search {
    max-width: 400px;
}

.row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    flex-wrap: wrap;
    justify-content: center;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    text-align: center;
}

canvas {
    margin-top: 20px;
    width: 100% !important;
    max-width: 400px;
    height: 200px !important;
}
</style>
</head>

<body>

<h1>💱 Конвертер валют</h1>

<input class="search" id="search" placeholder="Поиск валюты...">

<div class="row">
    <input type="number" id="amount" value="1">
    <select id="from"></select>
    ➡️
    <select id="to"></select>
</div>

<div class="result" id="result"></div>
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let allRates = {};
let currencies = [];
let chart;

// ⭐ Названия валют (расширил немного)
const currencyNames = {
    USD: "Доллар США",
    EUR: "Евро",
    RUB: "Российский рубль",
    UZS: "Узбекский сум",
    AZN: "Азербайджанский манат",
    GBP: "Фунт стерлингов",
    KZT: "Казахстанский тенге",
    TRY: "Турецкая лира",
    CNY: "Китайский юань",
    AMD: "Армянский драм",
    ALL: "Албанский лек",
    AED: "Дирхам ОАЭ",
    JPY: "Японская иена",
    KRW: "Южнокорейская вона"
};

// 🚀 Загрузка валют
async function loadCurrencies() {
    let res = await fetch("https://open.er-api.com/v6/latest/USD");
    let data = await res.json();

    allRates = data.rates;
    currencies = Object.keys(allRates);

    updateSelects(currencies);

    document.getElementById("from").value = "USD";
    document.getElementById("to").value = "UZS";

    convert();
}

// 📋 Обновление списков
function updateSelects(list) {
    let from = document.getElementById("from");
    let to = document.getElementById("to");

    from.innerHTML = "";
    to.innerHTML = "";

    let favorites = ["USD", "EUR", "RUB", "UZS"];

    favorites.forEach(cur => {
        if (list.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option("⭐ " + name + " | " + cur, cur));
            to.add(new Option("⭐ " + name + " | " + cur, cur));
        }
    });

    list.forEach(cur => {
        if (!favorites.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option(name + " | " + cur, cur));
            to.add(new Option(name + " | " + cur, cur));
        }
    });
}

// 🔍 Поиск (исправленный)
document.getElementById("search").addEventListener("input", function () {
    let query = this.value.toLowerCase();

    let filtered = currencies.filter(c => {
        let name = (currencyNames[c] || "").toLowerCase();
        return c.toLowerCase().includes(query) || name.includes(query);
    });

    updateSelects(filtered);
});

// ⚡ Только нужные события (фикс лагов)
document.getElementById("amount").addEventListener("input", convert);
document.getElementById("from").addEventListener("change", convert);
document.getElementById("to").addEventListener("change", convert);

// 💱 Конвертация
async function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (!amount) return;

    let res = await fetch("https://open.er-api.com/v6/latest/" + from);
    let data = await res.json();

    let rate = data.rates[to];
    let result = (amount * rate).toFixed(2);

    document.getElementById("result").innerText =
        amount + " " + from + " = " + result + " " + to;

    drawChart(rate);
}

// 📈 График (оптимизирован)
function drawChart(rate) {
    let ctx = document.getElementById("chart").getContext("2d");

    let data = [
        rate * 0.95,
        rate * 0.97,
        rate,
        rate * 1.01,
        rate * 1.03
    ];

    if (chart) {
        chart.data.datasets[0].data = data;
        chart.update();
        return;
    }

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["-4", "-3", "-2", "-1", "Сегодня"],
            datasets: [{
                label: 'Курс',
                data: data,
                borderColor: '#3b82f6',
                fill: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}

loadCurrencies();
</script>

</body>
</html>

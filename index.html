<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Конвертер валют</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}
h1 {
    font-size: 40px;
    margin-bottom: 20px;
}
input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}
.search {
    width: 220px;
}
.row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
}
.result {
    margin-top: 20px;
    font-size: 22px;
}
canvas {
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>💱 Конвертер валют</h1>

<input class="search" id="search" placeholder="Поиск валюты..." oninput="filterCurrencies()">

<div class="row">
    <input type="number" id="amount" value="1">
    <select id="from"></select>
    ➡️
    <select id="to"></select>
</div>

<div class="result" id="result"></div>
<canvas id="chart" width="300" height="150"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let allRates = {};
let currencies = [];

// ⭐ Названия валют
const currencyNames = {
    USD: "Доллар США",
    EUR: "Евро",
    RUB: "Российский рубль",
    UZS: "Узбекский сум",
    AZN: "Азербайджанский манат",
    GBP: "Фунт стерлингов",
    KZT: "Казахстанский тенге",
    TRY: "Турецкая лира",
    CNY: "Китайский юань"
};

async function loadCurrencies() {
    let res = await fetch("https://open.er-api.com/v6/latest/USD");
    let data = await res.json();
    allRates = data.rates;
    currencies = Object.keys(allRates);
    updateSelects(currencies);

    document.getElementById("from").value = "USD";
    document.getElementById("to").value = "UZS";
    convert();
}

// ⭐ Обновление списков
function updateSelects(list) {
    let from = document.getElementById("from");
    let to = document.getElementById("to");

    from.innerHTML = "";
    to.innerHTML = "";

    let favorites = ["USD", "EUR", "RUB", "UZS"];

    favorites.forEach(cur => {
        if (list.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option("⭐ " + name + " | " + cur, cur));
            to.add(new Option("⭐ " + name + " | " + cur, cur));
        }
    });

    list.forEach(cur => {
        if (!favorites.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option(name + " | " + cur, cur));
            to.add(new Option(name + " | " + cur, cur));
        }
    });
}

// 🔍 Поиск
function filterCurrencies() {
    let query = document.getElementById("search").value.toUpperCase();
    let filtered = currencies.filter(c => c.includes(query));
    updateSelects(filtered);
}

// ⚡ Конвертация
document.addEventListener("input", convert);

async function convert() {
    let amount = document.getElementById("amount").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (!amount) return;

    let res = await fetch("https://open.er-api.com/v6/latest/" + from);
    let data = await res.json();

    let rate = data.rates[to];
    let result = (amount * rate).toFixed(2);

    document.getElementById("result").innerText =
        amount + " " + from + " = " + result + " " + to;

    drawChart(rate);
}

// 📈 График
let chart;

function drawChart(rate) {
    let ctx = document.getElementById("chart").getContext("2d");

    let data = [
        rate * 0.9,
        rate * 0.95,
        rate,
        rate * 1.02,
        rate * 1.05
    ];

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["-4", "-3", "-2", "-1", "Сегодня"],
            datasets: [{
                label: 'Курс',
                data: data,
                borderColor: '#3b82f6',
                fill: false
            }]
        }
    });
}

loadCurrencies();
</script>

</body>
</html>

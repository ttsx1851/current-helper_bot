<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конвертер валют</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
    text-align: center;
}

input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin: 5px;
    width: 100%;
    box-sizing: border-box;
}

.search {
    max-width: 400px;
}

.row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    padding: 15px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    flex-wrap: wrap;
    justify-content: center;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    text-align: center;
}

canvas {
    margin-top: 20px;
    width: 100% !important;
    max-width: 400px;
    height: 200px !important;
}
</style>
</head>

<body>

<h1>💱 Конвертер валют</h1>

<input class="search" id="search" placeholder="Поиск валюты...">

<div class="row">
    <input type="number" id="amount" value="1">
    <select id="from"></select>
    ➡️
    <select id="to"></select>
</div>

<div class="result" id="result"></div>
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ✅ СНАЧАЛА объявляем элементы!
const amount = document.getElementById("amount");
const from = document.getElementById("from");
const to = document.getElementById("to");
const resultBlock = document.getElementById("result");
const search = document.getElementById("search");

let allRates = {};
let currencies = [];
let chart;

const currencyNames = {
    USD: "Доллар США",
    EUR: "Евро",
    RUB: "Российский рубль",
    UZS: "Узбекский сум",
    AMD: "Армянский драм",
    ALL: "Албанский лек",
    AED: "Дирхам ОАЭ",
    GBP: "Фунт стерлингов",
    KZT: "Казахстанский тенге",
    TRY: "Турецкая лира",
    CNY: "Китайский юань",
    JPY: "Японская иена",
    KRW: "Южнокорейская вона",

    AUD: "Австралийский доллар",
    CAD: "Канадский доллар",
    CHF: "Швейцарский франк",
    NZD: "Новозеландский доллар",

    SEK: "Шведская крона",
    NOK: "Норвежская крона",
    DKK: "Датская крона",
    ISK: "Исландская крона",

    PLN: "Польский злотый",
    CZK: "Чешская крона",
    HUF: "Венгерский форинт",
    RON: "Румынский лей",
    BGN: "Болгарский лев",
    HRK: "Хорватская куна",

    UAH: "Украинская гривна",
    BYN: "Белорусский рубль",
    GEL: "Грузинский лари",
    AZN: "Азербайджанский манат",
    TJS: "Таджикский сомони",
    TMT: "Туркменский манат",
    KGS: "Киргизский сом",
    MDL: "Молдавский лей",

    INR: "Индийская рупия",
    PKR: "Пакистанская рупия",
    BDT: "Бангладешская така",
    LKR: "Шри-ланкийская рупия",
    NPR: "Непальская рупия",

    VND: "Вьетнамский донг",
    THB: "Таиландский бат",
    IDR: "Индонезийская рупия",
    MYR: "Малайзийский ринггит",
    SGD: "Сингапурский доллар",
    HKD: "Гонконгский доллар",
    TWD: "Тайваньский доллар",
    PHP: "Филиппинское песо",

    SAR: "Саудовский риял",
    QAR: "Катарский риял",
    KWD: "Кувейтский динар",
    BHD: "Бахрейнский динар",
    OMR: "Оманский риял",
    JOD: "Иорданский динар",
    ILS: "Израильский шекель",

    ZAR: "Южноафриканский рэнд",
    EGP: "Египетский фунт",
    NGN: "Нигерийская найра",
    KES: "Кенийский шиллинг",
    GHS: "Ганский седи",
    MAD: "Марокканский дирхам",
    DZD: "Алжирский динар",
    TND: "Тунисский динар",

    BRL: "Бразильский реал",
    ARS: "Аргентинское песо",
    CLP: "Чилийское песо",
    COP: "Колумбийское песо",
    MXN: "Мексиканское песо",
    PEN: "Перуанский соль",
    UYU: "Уругвайское песо",
    BOB: "Боливийский боливиано",

    CRC: "Коста-риканский колон",
    DOP: "Доминиканское песо",
    GTQ: "Гватемальский кетсаль",
    HNL: "Гондурасская лемпира",
    NIO: "Никарагуанская кордоба",
    PAB: "Панамский бальбоа",

    XOF: "Франк КФА (Западная Африка)",
    XAF: "Франк КФА (Центральная Африка)",
    XPF: "Франк КФП",

    MNT: "Монгольский тугрик",
    LAK: "Лаосский кип",
    KHR: "Камбоджийский риель",
    MMK: "Мьянманский кьят",

    FJD: "Фиджийский доллар",
    PGK: "Кина Папуа-Новой Гвинеи",
    SBD: "Доллар Соломоновых островов",
    WST: "Самоанская тала",
    TOP: "Тонганская паанга",

    BND: "Брунейский доллар",
    MOP: "Патака Макао",

    ETB: "Эфиопский быр",
    UGX: "Угандийский шиллинг",
    TZS: "Танзанийский шиллинг",
    RWF: "Руандийский франк",
    MWK: "Малавийская квача",
    ZMW: "Замбийская квача"
};

// загрузка
async function loadCurrencies() {
    let res = await fetch("https://open.er-api.com/v6/latest/USD");
    let data = await res.json();

    allRates = data.rates;
    currencies = Object.keys(allRates);

    updateSelects(currencies);

    from.value = "USD";
    to.value = "UZS";

    convert();
}

// обновление списков
function updateSelects(list) {
    from.innerHTML = "";
    to.innerHTML = "";

    let favorites = ["USD", "EUR", "RUB", "UZS"];

    favorites.forEach(cur => {
        if (list.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option("⭐ " + name + " | " + cur, cur));
            to.add(new Option("⭐ " + name + " | " + cur, cur));
        }
    });

    list.forEach(cur => {
        if (!favorites.includes(cur)) {
            let name = currencyNames[cur] || cur;
            from.add(new Option(name === cur ? cur : name + " | " + cur, cur));
            to.add(new Option(name === cur ? cur : name + " | " + cur, cur));
        }
    });
}

// ✅ поиск (теперь работает)
search.addEventListener("input", function() {
    let query = search.value.toLowerCase();

    let filtered = currencies.filter(c => {
        let name = (currencyNames[c] || "").toLowerCase();
        return c.toLowerCase().includes(query) || name.includes(query);
    });

    updateSelects(filtered);
});

// ✅ события
amount.addEventListener("input", convert);
from.addEventListener("change", convert);
to.addEventListener("change", convert);

// конвертация
async function convert() {
    let value = amount.value;
    if (!value) return;

    let res = await fetch("https://open.er-api.com/v6/latest/" + from.value);
    let data = await res.json();

    let rate = data.rates[to.value];
    let result = (value * rate).toFixed(2);

    resultBlock.innerText = `${value} ${from.value} = ${result} ${to.value}`;

    drawChart(rate);
}

// график
function drawChart(rate) {
    let ctx = document.getElementById("chart").getContext("2d");

    let data = [
        rate * 0.95,
        rate * 0.98,
        rate,
        rate * 1.01,
        rate * 1.03
    ];

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["-4", "-3", "-2", "-1", "Сегодня"],
            datasets: [{
                label: 'Курс',
                data: data,
                borderColor: '#3b82f6'
            }]
        },
        options: {
            responsive: true,
            animation: false
        }
    });
}

loadCurrencies();
</script>

</body>
</html>
